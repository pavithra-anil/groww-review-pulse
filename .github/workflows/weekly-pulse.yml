name: Weekly Groww Review Pulse

on:
  schedule:
    # Every Monday at 9:00 AM IST (3:30 AM UTC)
    - cron: '30 3 * * 1'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI
    inputs:
      week:
        description: 'ISO week to run (e.g. 2026-W17). Leave empty for current week.'
        required: false
        default: ''
      weeks:
        description: 'Number of weeks to fetch reviews for'
        required: false
        default: '10'

jobs:
  pulse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Create .env file
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "MCP_SERVER_URL=${{ secrets.MCP_SERVER_URL }}" >> .env
          echo "GOOGLE_DOC_ID=${{ secrets.GOOGLE_DOC_ID }}" >> .env
          echo "GMAIL_TO=${{ secrets.GMAIL_TO }}" >> .env
          echo "CONFIRM_SEND=${{ secrets.CONFIRM_SEND }}" >> .env

      - name: Initialize database
        run: uv run python -m agent init-db

      - name: Run full pipeline
        run: |
          if [ -n "${{ github.event.inputs.week }}" ]; then
            uv run python -m agent run --product groww --week ${{ github.event.inputs.week }} --weeks ${{ github.event.inputs.weeks }}
          else
            uv run python -m agent run --product groww --weeks ${{ github.event.inputs.weeks || '10' }}
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pulse-artifacts
          path: data/artifacts/
          retention-days: 30